---
services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    container_name: freqtrade
    restart: unless-stopped
    volumes:
      - freqtrade_data:/freqtrade/user_data
    ports:
      - "8080:8080"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --config /freqtrade/user_data/config.json
      --strategy SampleStrategy

  config-server:
    build: ./config-server
    container_name: freqtrade-config
    restart: unless-stopped
    volumes:
      - freqtrade_data:/freqtrade/user_data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Shanghai
    command: >
      /bin/bash -c "
        cp /freqtrade/user_data/config.json /freqtrade/user_data/config.json.bak 2>/dev/null || true;
        mkdir -p /freqtrade/user_data/strategies /freqtrade/user_data/logs /freqtrade/user_data/backups;
        if [ ! -f /freqtrade/user_data/config.json ] || [ ! -s /freqtrade/user_data/config.json ]; then
          echo '{\"max_open_trades\":3,\"stake_currency\":\"USDT\",\"stake_amount\":30,\"tradable_balance_ratio\":0.99,\"fiat_display_currency\":\"CNY\",\"timeframe\":\"5m\",\"dry_run\":true,\"dry_run_wallet\":1000,\"strategy\":\"SampleStrategy\",\"stoploss\":-0.1,\"api_server\":{\"enabled\":true,\"listen_ip_address\":\"0.0.0.0\",\"listen_port\":8080,\"verbosity\":\"error\",\"jwt_secret_key\":\"freqtrade_jwt_secret_key_change_me\",\"ws_token\":\"freqtrade_ws_token_change_me\",\"CORS_origins\":[],\"username\":\"freqtrade\",\"password\":\"KJDD9773LJKDkjkj\"},\"exchange\":{\"name\":\"binance\",\"key\":\"\",\"secret\":\"\",\"ccxt_config\":{},\"ccxt_async_config\":{},\"pair_whitelist\":[\"BTC/USDT\",\"ETH/USDT\"],\"pair_blacklist\":[]},\"pairlists\":[{\"method\":\"StaticPairList\"}],\"telegram\":{\"enabled\":false,\"token\":\"\",\"chat_id\":\"\"}}' > /freqtrade/user_data/config.json;
        fi;
        if [ ! -f /freqtrade/user_data/strategies/SampleStrategy.py ]; then
          echo 'from freqtrade.strategy import IStrategy
from pandas import DataFrame
import talib.abstract as ta

class SampleStrategy(IStrategy):
    INTERFACE_VERSION = 3
    can_short = False
    minimal_roi = {\"0\": 0.10}
    stoploss = -0.10
    timeframe = \"5m\"
    buy_rsi = 30
    sell_rsi = 70

    def populate_indicators(self, dataframe: DataFrame, metadata: dict) -> DataFrame:
        dataframe[\"rsi\"] = ta.RSI(dataframe, timeperiod=14)
        return dataframe

    def populate_entry_trend(self, dataframe: DataFrame, metadata: dict) -> DataFrame:
        dataframe.loc[(dataframe[\"rsi\"] < self.buy_rsi), \"enter_long\"] = 1
        return dataframe

    def populate_exit_trend(self, dataframe: DataFrame, metadata: dict) -> DataFrame:
        dataframe.loc[(dataframe[\"rsi\"] > self.sell_rsi), \"exit_long\"] = 1
        return dataframe' > /freqtrade/user_data/strategies/SampleStrategy.py;
        fi;
        cd /app && python -m uvicorn app:app --host 0.0.0.0 --port 8000
      "

volumes:
  freqtrade_data:
